name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: python -m unittest tests.test_build_trend_source.UnitTests

  contract:
    name: contract tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run contract tests
        run: python -m unittest tests.test_build_trend_source.ContractTests

  module-e2e:
    name: module e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run module end-to-end tests
        run: python -m unittest tests.test_build_trend_source.ModuleEndToEndTests

  functional-e2e:
    name: functional e2e
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run functional end-to-end tests
        run: python -m unittest tests.test_build_trend_source.FunctionalEndToEndTests
