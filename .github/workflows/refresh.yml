name: Refresh trend source

on:
  schedule:
    - cron: "10 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-trend-source
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build trend source JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_trend_source.py

      - name: Commit refreshed JSON
        id: commit
        run: |
          set -e
          BRANCH="data-latest"
          git switch -C "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/trendradar_source.json
          if git diff --cached --quiet; then
            echo "No changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Refresh trend source"
          git push --force-with-lease origin "$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open refresh PR
        id: pr
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh pr create \
              --base main \
              --head data-latest \
              --title "Refresh trend source" \
              --body "Automated trend source refresh. CI must pass before merge."; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          elif gh pr view data-latest >/dev/null 2>&1; then
            gh pr edit data-latest \
              --title "Refresh trend source" \
              --body "Automated trend source refresh. CI must pass before merge."
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::GitHub Actions cannot create pull requests in this organization. data-latest was updated and main remains protected."
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge after CI
        if: steps.pr.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge data-latest --auto --squash
